<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>最小 CI/CD 部署</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">GitHub Actions + Pages</p>
      <h1>最小 CI/CD 部署已经接通</h1>
      <p class="lead">
        每次推送到 <code>main</code>，GitHub Actions 会运行 smoke test、构建静态产物，并部署到 GitHub Pages。
      </p>
      <section class="checks" aria-label="pipeline steps">
        <article>
          <span>1</span>
          <strong>Test</strong>
          <p>确认页面和构建脚本存在。</p>
        </article>
        <article>
          <span>2</span>
          <strong>Build</strong>
          <p>把 <code>src</code> 输出到 <code>dist</code>。</p>
        </article>
        <article>
          <span>3</span>
          <strong>Deploy</strong>
          <p>发布 <code>dist</code> 到 GitHub Pages。</p>
        </article>
      </section>
    </main>
  </body>
</html>
